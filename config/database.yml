default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5).to_i %>
  username: <%= ENV.fetch("DATABASE_USER", "skill_test") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "skill_test") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432).to_i %>

development:
  <<: *default
  database: skill_test_development

test:
  <<: *default
  database: skill_test_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "skill_test_production") %>
